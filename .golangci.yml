# golangci-lint configuration for RaceLLM
# Docs: https://golangci-lint.run/usage/configuration/
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - revive
    - godot
    - misspell
    - whitespace
    - gosec
    - bodyclose
    - noctx
    - rowserrcheck
    - gocritic

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - fieldalignment

    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"

    gosec:
      excludes:
        - G107

    godot:
      scope: declarations
      capital: true

    misspell:
      locale: US

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - exitAfterDefer
        - hugeParam
        - unnamedResult

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
