# RaceLLM Configuration
# API keys can reference environment variables with $ prefix: "$OPENAI_API_KEY"

default_mode: all # "fastest" = cancel losers, "all" = wait for everyone

providers:
  openai:
    enabled: true
    api_key: "$OPENAI_API_KEY"
    # base_url: "https://api.openai.com/v1"  # optional override
    timeout_seconds: 60
    models:
      - gpt-5.4
      - gpt-5-codex

  anthropic:
    enabled: true
    api_key: "$ANTHROPIC_API_KEY"
    timeout_seconds: 60
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6

  gemini:
    enabled: false
    api_key: "$GEMINI_API_KEY"
    timeout_seconds: 60
    models:
      - gemini-3.1-pro-preview
      - gemini-3-flash-preview

  ollama:
    enabled: false
    # base_url: "http://localhost:11434"  # default
    timeout_seconds: 120
    models:
      - nemotron-cascade-2